name: ci-contracts

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies (for runtime OpenAPI validation)
        run: python -m pip install -r apps/api/requirements.txt

      - name: Contract sync check
        run: python scripts/check_contract_sync.py
