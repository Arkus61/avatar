services:
  postgres:
    image: postgres:16-alpine
    container_name: avatar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: avatar
      POSTGRES_USER: avatar
      POSTGRES_PASSWORD: avatar
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avatar -d avatar"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - avatar_pg_data:/var/lib/postgresql/data

volumes:
  avatar_pg_data:
